name: Check the IVOA document

env:
  DOC_NAME: HiPS

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  build:
    runs-on: ubuntu-latest

    # Prevent multiple runs for the same PR from overlapping
    concurrency:
      group: preview-${{ github.event.pull_request.number }}
      cancel-in-progress: true

    steps:
      - name: Checkout the repository
        uses: actions/checkout@v4
        with:
          submodules: true
          fetch-depth: 0  # safer for tools that inspect history

      - name: Build the document
        shell: bash
        run: |
          set -euo pipefail

          DOC_PATH="$(pwd)"

          docker run --rm \
            --user "$(id -u):$(id -g)" \
            --volume "${DOC_PATH}:/document:rw" \
            ghcr.io/ivoa/ivoatex-docker:latest \
            make

      - name: Verify expected outputs exist
        shell: bash
        run: |
          set -euo pipefail

          for ext in pdf bbl; do
            file="${DOC_NAME}.${ext}"
            if [[ ! -f "$file" ]]; then
              echo "❌ Missing expected output: $file"
              exit 1
            fi
          done

      - name: Upload PDF artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: PDF-${{ github.event.pull_request.number }}
          path: ${{ env.DOC_NAME }}.pdf
          if-no-files-found: error
